<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | AKA Kurtis</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="checkout-container">

        <h1>Checkout</h1>
<div class="checkout-logo">
    <img src="BRAND.jpg" alt="AKA Kurtis Logo">
</div>
        <div id="order-summary"></div>

        <h2>
            Total: ₹<span id="order-total">0</span>
        </h2>

        <form onsubmit="event.preventDefault(); placeOrder();">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required
            >

            <input
                type="tel"
                id="phone"
                placeholder="Phone Number"
                required
            >

            <textarea
                id="address"
                placeholder="Full Address"
                required
            ></textarea>

            <input
                type="text"
                id="city"
                placeholder="City"
                required
            >

            <input
                type="text"
                id="pincode"
                placeholder="Pincode"
                required
            >

            <label>
                Payment Method
            </label>

            <select id="payment">

                <option value="Cash on Delivery">
                    Cash on Delivery
                </option>

                <option value="UPI">
                    UPI (9510659255@oksbi)
                </option>

            </select>

            <button type="submit" class="btn">
                Place Order
            </button>

        </form>

    </section>

    <script src="checkout.js"></script>

</body>

</html>
